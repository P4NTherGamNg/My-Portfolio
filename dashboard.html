<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Dumindu Dulanjana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .dashboard-section { padding: 60px 0; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 20px; }
    .dashboard-header h2 { font-size: 2.5rem; color: var(--text-primary); }
    .add-form { background: var(--bg-secondary); padding: 30px; border-radius: 32px; border: 1px solid var(--card-border); margin-bottom: 50px; }
    .add-form h3 { font-size: 1.8rem; margin-bottom: 24px; color: var(--text-primary); }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 16px; border: 2px solid var(--card-border); border-radius: 30px; background: var(--bg-primary); color: var(--text-primary); font-size: 1rem; }
    .form-group textarea { border-radius: 20px; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--btn-primary); }
    .progress-type-group { display: flex; gap: 30px; align-items: center; margin: 20px 0; }
    .progress-type-group label { display: flex; align-items: center; gap: 6px; color: var(--text-primary); }
    .date-fields, .fixed-progress-field { display: flex; gap: 20px; margin-top: 10px; }
    .form-actions { display: flex; gap: 16px; margin-top: 20px; }
    .btn-primary { background: var(--btn-primary); color: white; padding: 14px 32px; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-primary:hover { background: var(--btn-primary-hover); }
    .btn-secondary { background: transparent; border: 2px solid var(--btn-primary); color: var(--btn-primary); padding: 14px 32px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-secondary:hover { background: var(--btn-primary); color: white; }
    .quals-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
    .edit-btn, .delete-btn { flex: 1; padding: 8px; border-radius: 30px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 2px solid; }
    .edit-btn { background: transparent; border-color: var(--btn-primary); color: var(--btn-primary); }
    .edit-btn:hover { background: var(--btn-primary); color: white; }
    .delete-btn { background: transparent; border-color: #dc2626; color: #dc2626; }
    .delete-btn:hover { background: #dc2626; color: white; }
    #form-cancel-btn { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <div class="logo">Dumindu D.</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="#Qualifications">Qualifications</a>
        <a href="#Gallery">Gallery</a>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode"><i class="fas fa-moon"></i></button>
      </div>
    </nav>
  </div>

  <!-- Messages Section -->
  <div class="dashboard-section" style="margin-top: 60px;">
    <div class="container">
      <h2 class="section-title">Received Messages</h2>
      <div id="messages-container" class="messages-grid"></div>
    </div>
  </div>

  <section id="Qualifications" class="dashboard-section">
    <div class="container">
      <div class="dashboard-header">
        <h2>Manage Qualifications</h2>
        <button id="logout-btn" class="btn-secondary">Logout</button>
      </div>
      <div class="add-form">
        <h3>Add / Edit Qualification</h3>
        <form id="qual-form">
          <input type="hidden" id="edit-id">
          <div class="form-grid">
            <input type="text" id="edit-title" placeholder="Title (e.g., NVQ Level 06)" required>
            <input type="text" id="edit-level" placeholder="Level tag (e.g., Advanced · in progress)" required>
            <input type="text" id="edit-status" placeholder="Status (e.g., Started Jan 2026)" required>
            <select id="edit-icon">
              <option value="fa-certificate">Certificate</option>
              <option value="fa-layer-group">Layers</option>
              <option value="fa-code">Code</option>
              <option value="fa-database">Database</option>
              <option value="fa-network-wired">Network</option>
            </select>
          </div>
          <textarea id="edit-desc" placeholder="Description" rows="3" required></textarea>
          <div class="progress-type-group">
            <label><input type="radio" name="progressType" id="edit-progress-type-date" value="date" checked onchange="toggleProgressFields()"> Date range</label>
            <label><input type="radio" name="progressType" id="edit-progress-type-fixed" value="fixed" onchange="toggleProgressFields()"> Fixed %</label>
            <label><input type="radio" name="progressType" id="edit-progress-type-none" value="none" onchange="toggleProgressFields()"> No progress</label>
          </div>
          <div id="date-fields" class="date-fields">
            <input type="date" id="edit-start-date" style="flex:1;">
            <input type="date" id="edit-end-date" style="flex:1;">
          </div>
          <div id="fixed-progress-field" class="fixed-progress-field" style="display:none;">
            <input type="number" id="edit-fixed-progress" min="0" max="100" placeholder="Progress %" style="flex:1;">
          </div>
          <div class="form-actions">
            <button type="submit" id="form-submit-btn" class="btn-primary">Add Qualification</button>
            <button type="button" id="form-cancel-btn" class="btn-secondary" onclick="clearEditForm()">Cancel</button>
          </div>
        </form>
      </div>
      <h3>Current Qualifications</h3>
      <div id="dashboard-quals-container" class="quals-grid"></div>
    </div>
  </section>

  <div id="Gallery" class="dashboard-section">
    <div class="container">
      <h2 class="section-title">Gallery Management</h2>
      <div class="add-form">
        <h3>Add / Edit Photo</h3>
        <form id="gallery-form">
          <input type="hidden" id="edit-image-id">
          <div class="form-grid">
            <input type="text" id="edit-image-title" placeholder="Photo title" required>
            <input type="text" id="edit-image-tags" placeholder="Tags (comma separated)">
            <input type="file" id="edit-image-file" accept="image/*">
          </div>
          <img id="edit-image-preview" style="max-width:200px; max-height:200px; display:none; border-radius:8px;">
          <div class="form-actions">
            <button type="submit" id="gallery-form-submit" class="btn-primary">Upload Image</button>
            <button type="button" id="gallery-form-cancel" class="btn-secondary" onclick="clearGalleryForm()" style="display:none;">Cancel</button>
          </div>
        </form>
      </div>
      <h3>Uploaded Photos</h3>
      <div id="dashboard-gallery-container" class="dashboard-gallery-grid"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="container"><p>© 2026 Dumindu Dulanjana — ICT portfolio</p></div>
  </footer>

  <script src="script.js"></script>
  <script src="qualifications.js"></script>
  <script src="gallery.js"></script>
  <script src="messages.js"></script>
  <script>
    if (localStorage.getItem('portfolio_logged_in') !== 'true') window.location.href = 'login.html';
    renderQualifications('dashboard-quals-container', true);
    renderDashboardGallery('dashboard-gallery-container');
    document.getElementById('gallery-form').addEventListener('submit', handleGallerySubmit);
    loadMessages();
    document.getElementById('logout-btn').addEventListener('click', () => { localStorage.removeItem('portfolio_logged_in'); window.location.href = 'index.html'; });
  </script>
  
    <script src="script.js"></script>
  <script src="qualifications.js"></script>
  <script src="gallery.js"></script>
  <script src="messages.js"></script>
  <script>
    // Check login
    if (localStorage.getItem('portfolio_logged_in') !== 'true') {
      window.location.href = 'login.html';
    }

    // Render qualifications (with edit/delete buttons)
    renderQualifications('dashboard-quals-container', true);

    // Render gallery
    renderDashboardGallery('dashboard-gallery-container');

    // Qualification form submit listener (was missing!)
    document.getElementById('qual-form').addEventListener('submit', handleQualificationSubmit);

    // Gallery form submit
    document.getElementById('gallery-form').addEventListener('submit', handleGallerySubmit);

    // Messages
    loadMessages();

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('portfolio_logged_in');
      window.location.href = 'index.html';
    });
  </script>
  
</body>
</html>
