<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Dumindu Dulanjana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .dashboard-section { padding: 60px 0; }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }
    .dashboard-header h2 { font-size: 2.5rem; color: var(--text-primary); }
    .add-form {
      background: var(--bg-secondary);
      padding: 30px;
      border-radius: 32px;
      border: 1px solid var(--card-border);
      margin-bottom: 50px;
    }
    .add-form h3 { font-size: 1.8rem; margin-bottom: 24px; color: var(--text-primary); }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--card-border);
      border-radius: 30px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 1rem;
    }
    .form-group textarea { border-radius: 20px; resize: vertical; }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--btn-primary);
    }
    .progress-type-group {
      display: flex;
      gap: 30px;
      align-items: center;
      margin: 20px 0;
    }
    .progress-type-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-primary);
    }
    .date-fields, .fixed-progress-field {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }
    .form-actions {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }
    .btn-primary {
      background: var(--btn-primary);
      color: white;
      padding: 14px 32px;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--btn-primary-hover); }
    .btn-secondary {
      background: transparent;
      border: 2px solid var(--btn-primary);
      color: var(--btn-primary);
      padding: 14px 32px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background: var(--btn-primary);
      color: white;
    }
    .quals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }
    .edit-btn, .delete-btn {
      flex: 1;
      padding: 8px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid;
    }
    .edit-btn {
      background: transparent;
      border-color: var(--btn-primary);
      color: var(--btn-primary);
    }
    .edit-btn:hover {
      background: var(--btn-primary);
      color: white;
    }
    .delete-btn {
      background: transparent;
      border-color: #dc2626;
      color: #dc2626;
    }
    .delete-btn:hover {
      background: #dc2626;
      color: white;
    }
    body.dark-mode .delete-btn {
      border-color: #ef4444;
      color: #ef4444;
    }
    body.dark-mode .delete-btn:hover {
      background: #ef4444;
      color: white;
    }
    #form-cancel-btn { display: none; }
	
	.dashboard-gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.dashboard-gallery-card {
  background: var(--bg-secondary);
  border-radius: 24px;
  overflow: hidden;
  border: 1px solid var(--card-border);
  box-shadow: var(--shadow-card);
}

.dashboard-gallery-card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.dashboard-gallery-info {
  padding: 16px;
}

.dashboard-gallery-info h4 {
  font-size: 1.2rem;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.dashboard-gallery-info p {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 12px;
}

.dashboard-gallery-actions {
  display: flex;
  gap: 8px;
}

.edit-gallery-btn, .delete-gallery-btn {
  flex: 1;
  padding: 8px;
  border: 2px solid;
  border-radius: 30px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
}

.edit-gallery-btn {
  border-color: var(--btn-primary);
  color: var(--btn-primary);
}

.edit-gallery-btn:hover {
  background: var(--btn-primary);
  color: white;
}

.delete-gallery-btn {
  border-color: #dc2626;
  color: #dc2626;
}

.delete-gallery-btn:hover {
  background: #dc2626;
  color: white;
}



/* Messages styling */
.messages-grid {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-top: 20px;
}
.message-card {
  background: var(--bg-secondary);
  border-radius: 24px;
  padding: 20px;
  border: 1px solid var(--card-border);
  box-shadow: var(--shadow-card);
  transition: all 0.2s;
}
.message-card.unread {
  border-left: 6px solid var(--btn-primary);
  background: var(--highlight-bg);
}
.message-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 12px;
}
.message-from {
  font-weight: 700;
  color: var(--text-primary);
  font-size: 1.1rem;
}
.message-date {
  font-size: 0.8rem;
  color: var(--text-muted);
}
.message-email, .message-phone {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 8px;
}
.message-email a, .message-phone a {
  color: var(--text-muted);
  text-decoration: none;
}
.message-email a:hover, .message-phone a:hover {
  color: var(--btn-primary);
}
.message-content {
  margin: 12px 0;
  color: var(--text-secondary);
  background: var(--bg-primary);
  padding: 12px;
  border-radius: 16px;
}
.message-actions {
  display: flex;
  gap: 12px;
  margin-top: 12px;
}
.message-actions button {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 0.9rem;
  padding: 6px 12px;
  border-radius: 30px;
  transition: all 0.2s;
}
.mark-read-btn {
  color: var(--btn-primary);
  border: 1px solid var(--btn-primary);
}
.mark-read-btn:hover {
  background: var(--btn-primary);
  color: white;
}
.delete-message-btn {
  color: #dc2626;
  border: 1px solid #dc2626;
}
.delete-message-btn:hover {
  background: #dc2626;
  color: white;
}

  </style>

  <section id="Qualifications" class="dashboard-section">
    <div class="container">
      <div class="dashboard-header">
        <h2>Manage Qualifications</h2>
        <button id="logout-btn" class="btn-secondary" style="border:2px solid var(--btn-primary);">Logout</button>
      </div>

      <!-- Add/Edit Form -->
      <div class="add-form">
        <h3 id="form-title">Add / Edit Qualification</h3>
        <form id="qual-form">
          <input type="hidden" id="edit-id">

          <div class="form-grid">
            <div class="form-group">
              <input type="text" id="edit-title" placeholder="Title (e.g., NVQ Level 06)" required>
            </div>
            <div class="form-group">
              <input type="text" id="edit-level" placeholder="Level tag (e.g., Advanced · in progress)" required>
            </div>
            <div class="form-group">
              <input type="text" id="edit-status" placeholder="Status (e.g., Started Jan 2026)" required>
            </div>
            <div class="form-group">
              <select id="edit-icon">
                <option value="fa-certificate">Certificate</option>
                <option value="fa-layer-group">Layers</option>
                <option value="fa-code">Code</option>
                <option value="fa-database">Database</option>
                <option value="fa-network-wired">Network</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <textarea id="edit-desc" placeholder="Description" rows="3" required></textarea>
          </div>

          <!-- Progress Type -->
          <div class="progress-type-group">
            <label><input type="radio" name="progressType" id="edit-progress-type-date" value="date" checked onchange="toggleProgressFields()"> Date range</label>
            <label><input type="radio" name="progressType" id="edit-progress-type-fixed" value="fixed" onchange="toggleProgressFields()"> Fixed %</label>
            <label><input type="radio" name="progressType" id="edit-progress-type-none" value="none" onchange="toggleProgressFields()"> No progress</label>
          </div>

          <!-- Date fields -->
          <div id="date-fields" class="date-fields">
            <div class="form-group" style="flex:1;">
              <input type="date" id="edit-start-date">
            </div>
            <div class="form-group" style="flex:1;">
              <input type="date" id="edit-end-date">
            </div>
          </div>

          <!-- Fixed progress field -->
          <div id="fixed-progress-field" class="fixed-progress-field" style="display:none;">
            <div class="form-group" style="flex:1;">
              <input type="number" id="edit-fixed-progress" min="0" max="100" placeholder="Progress %">
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" id="form-submit-btn" class="btn-primary">Add Qualification</button>
            <button type="button" id="form-cancel-btn" class="btn-secondary" onclick="clearEditForm()">Cancel</button>
          </div>
        </form>
      </div>

      <!-- Qualifications List -->
      <h3 style="margin-bottom:20px; color:var(--text-primary);">Current Qualifications</h3>
      <div id="dashboard-quals-container" class="quals-grid"></div>
    </div>
  </section>
  
 <!-- Gallery Management -->

  <script>
  // Messages management
  function loadMessages() {
    const container = document.getElementById('messages-container');
    if (!container) {
      console.error('messages-container not found');
      return;
    }

    const messages = JSON.parse(localStorage.getItem('contactMessages') || '[]');
    console.log('Loaded messages:', messages); // for debugging

    if (messages.length === 0) {
      container.innerHTML = '<p class="no-messages">No messages yet.</p>';
      return;
    }

    container.innerHTML = '';
    messages.forEach(msg => {
      const card = document.createElement('div');
      card.className = `message-card ${!msg.read ? 'unread' : ''}`;
      card.dataset.id = msg.id;
      const formattedDate = new Date(msg.date).toLocaleString();
      card.innerHTML = `
        <div class="message-header">
          <span class="message-from">${escapeHtml(msg.name)}</span>
          <span class="message-date">${formattedDate}</span>
        </div>
        <div class="message-email"><i class="fas fa-envelope"></i> <a href="mailto:${escapeHtml(msg.email)}">${escapeHtml(msg.email)}</a></div>
        ${msg.phone ? `<div class="message-phone"><i class="fas fa-phone"></i> <a href="tel:${escapeHtml(msg.phone)}">${escapeHtml(msg.phone)}</a></div>` : ''}
        <div class="message-content">${escapeHtml(msg.message).replace(/\n/g, '<br>')}</div>
        <div class="message-actions">
          ${!msg.read ? `<button class="mark-read-btn" data-id="${msg.id}"><i class="fas fa-check"></i> Mark as read</button>` : ''}
          <button class="delete-message-btn" data-id="${msg.id}"><i class="fas fa-trash"></i> Delete</button>
        </div>
      `;
      container.appendChild(card);
    });

    // Attach event listeners to dynamic buttons
    document.querySelectorAll('.mark-read-btn').forEach(btn => {
      btn.addEventListener('click', () => markMessageRead(parseInt(btn.dataset.id)));
    });
    document.querySelectorAll('.delete-message-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteMessage(parseInt(btn.dataset.id)));
    });
  }

  function markMessageRead(id) {
    let messages = JSON.parse(localStorage.getItem('contactMessages') || '[]');
    const msg = messages.find(m => m.id === id);
    if (msg) msg.read = true;
    localStorage.setItem('contactMessages', JSON.stringify(messages));
    loadMessages(); // refresh
  }

  function deleteMessage(id) {
    if (!confirm('Delete this message?')) return;
    let messages = JSON.parse(localStorage.getItem('contactMessages') || '[]');
    messages = messages.filter(m => m.id !== id);
    localStorage.setItem('contactMessages', JSON.stringify(messages));
    loadMessages(); // refresh
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Load messages when page is ready
  document.addEventListener('DOMContentLoaded', function() {
    loadMessages();
  });
</script>
