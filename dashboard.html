<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Dumindu Dulanjana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .dashboard-section { padding: 60px 0; }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }
    .dashboard-header h2 { font-size: 2.5rem; color: var(--text-primary); }
    .add-form {
      background: var(--bg-secondary);
      padding: 30px;
      border-radius: 32px;
      border: 1px solid var(--card-border);
      margin-bottom: 50px;
    }
    .add-form h3 { font-size: 1.8rem; margin-bottom: 24px; color: var(--text-primary); }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--card-border);
      border-radius: 30px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 1rem;
    }
    .form-group textarea { border-radius: 20px; resize: vertical; }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--btn-primary);
    }
    .progress-type-group {
      display: flex;
      gap: 30px;
      align-items: center;
      margin: 20px 0;
    }
    .progress-type-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-primary);
    }
    .date-fields, .fixed-progress-field {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }
    .form-actions {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }
    .btn-primary {
      background: var(--btn-primary);
      color: white;
      padding: 14px 32px;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--btn-primary-hover); }
    .btn-secondary {
      background: transparent;
      border: 2px solid var(--btn-primary);
      color: var(--btn-primary);
      padding: 14px 32px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background: var(--btn-primary);
      color: white;
    }
    .quals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }
    .edit-btn, .delete-btn {
      flex: 1;
      padding: 8px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid;
    }
    .edit-btn {
      background: transparent;
      border-color: var(--btn-primary);
      color: var(--btn-primary);
    }
    .edit-btn:hover {
      background: var(--btn-primary);
      color: white;
    }
    .delete-btn {
      background: transparent;
      border-color: #dc2626;
      color: #dc2626;
    }
    .delete-btn:hover {
      background: #dc2626;
      color: white;
    }
    body.dark-mode .delete-btn {
      border-color: #ef4444;
      color: #ef4444;
    }
    body.dark-mode .delete-btn:hover {
      background: #ef4444;
      color: white;
    }
    #form-cancel-btn { display: none; }
	
	.dashboard-gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.dashboard-gallery-card {
  background: var(--bg-secondary);
  border-radius: 24px;
  overflow: hidden;
  border: 1px solid var(--card-border);
  box-shadow: var(--shadow-card);
}

.dashboard-gallery-card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.dashboard-gallery-info {
  padding: 16px;
}

.dashboard-gallery-info h4 {
  font-size: 1.2rem;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.dashboard-gallery-info p {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 12px;
}

.dashboard-gallery-actions {
  display: flex;
  gap: 8px;
}

.edit-gallery-btn, .delete-gallery-btn {
  flex: 1;
  padding: 8px;
  border: 2px solid;
  border-radius: 30px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
}

.edit-gallery-btn {
  border-color: var(--btn-primary);
  color: var(--btn-primary);
}

.edit-gallery-btn:hover {
  background: var(--btn-primary);
  color: white;
}

.delete-gallery-btn {
  border-color: #dc2626;
  color: #dc2626;
}

.delete-gallery-btn:hover {
  background: #dc2626;
  color: white;
}
  </style>
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <div class="logo">Dumindu D.</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="index.html#about">About</a>
        <a href="index.html#qualifications">Qualifications</a>
        <a href="index.html#contact">Contact</a>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </nav>
  </div>

  <section class="dashboard-section">
    <div class="container">
      <div class="dashboard-header">
        <h2>Manage Qualifications</h2>
        <button id="logout-btn" class="btn-secondary" style="border:2px solid var(--btn-primary);">Logout</button>
      </div>

      <!-- Add/Edit Form -->
      <div class="add-form">
        <h3 id="form-title">Add / Edit Qualification</h3>
        <form id="qual-form">
          <input type="hidden" id="edit-id">

          <div class="form-grid">
            <div class="form-group">
              <input type="text" id="edit-title" placeholder="Title (e.g., NVQ Level 06)" required>
            </div>
            <div class="form-group">
              <input type="text" id="edit-level" placeholder="Level tag (e.g., Advanced · in progress)" required>
            </div>
            <div class="form-group">
              <input type="text" id="edit-status" placeholder="Status (e.g., Started Jan 2026)" required>
            </div>
            <div class="form-group">
              <select id="edit-icon">
                <option value="fa-certificate">Certificate</option>
                <option value="fa-layer-group">Layers</option>
                <option value="fa-code">Code</option>
                <option value="fa-database">Database</option>
                <option value="fa-network-wired">Network</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <textarea id="edit-desc" placeholder="Description" rows="3" required></textarea>
          </div>

          <!-- Progress Type -->
          <div class="progress-type-group">
            <label><input type="radio" name="progressType" id="edit-progress-type-date" value="date" checked onchange="toggleProgressFields()"> Date range</label>
            <label><input type="radio" name="progressType" id="edit-progress-type-fixed" value="fixed" onchange="toggleProgressFields()"> Fixed %</label>
            <label><input type="radio" name="progressType" id="edit-progress-type-none" value="none" onchange="toggleProgressFields()"> No progress</label>
          </div>

          <!-- Date fields -->
          <div id="date-fields" class="date-fields">
            <div class="form-group" style="flex:1;">
              <input type="date" id="edit-start-date">
            </div>
            <div class="form-group" style="flex:1;">
              <input type="date" id="edit-end-date">
            </div>
          </div>

          <!-- Fixed progress field -->
          <div id="fixed-progress-field" class="fixed-progress-field" style="display:none;">
            <div class="form-group" style="flex:1;">
              <input type="number" id="edit-fixed-progress" min="0" max="100" placeholder="Progress %">
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" id="form-submit-btn" class="btn-primary">Add Qualification</button>
            <button type="button" id="form-cancel-btn" class="btn-secondary" onclick="clearEditForm()">Cancel</button>
          </div>
        </form>
      </div>

      <!-- Qualifications List -->
      <h3 style="margin-bottom:20px; color:var(--text-primary);">Current Qualifications</h3>
      <div id="dashboard-quals-container" class="quals-grid"></div>
    </div>
  </section>
  
  <!-- Gallery Management -->
<div class="dashboard-section" style="margin-top: 60px;">
  <h2 class="section-title">Gallery Management</h2>

  <!-- Upload/Edit Form -->
  <div class="add-form">
    <h3 id="gallery-form-title">Add / Edit Photo</h3>
    <form id="gallery-form">
      <input type="hidden" id="edit-image-id">
      
      <div class="form-grid">
        <div class="form-group">
          <input type="text" id="edit-image-title" placeholder="Photo title" required>
        </div>
        <div class="form-group">
          <input type="text" id="edit-image-tags" placeholder="Tags (comma separated)">
        </div>
        <div class="form-group">
          <input type="file" id="edit-image-file" accept="image/*">
        </div>
      </div>

      <div style="margin-bottom: 20px;">
        <img id="edit-image-preview" style="max-width: 200px; max-height: 200px; display: none; border-radius: 8px;">
      </div>

      <div class="form-actions">
        <button type="submit" id="gallery-form-submit" class="btn-primary">Upload Image</button>
        <button type="button" id="gallery-form-cancel" class="btn-secondary" onclick="clearGalleryForm()" style="display:none;">Cancel</button>
      </div>
    </form>
  </div>

  <!-- Gallery List -->
  <h3 style="margin-bottom:20px;">Uploaded Photos</h3>
  <div id="dashboard-gallery-container" class="dashboard-gallery-grid"></div>
</div>

  <footer class="footer">
    <div class="container">
      <p>© 2026 Dumindu Dulanjana — ICT portfolio</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script src="qualifications.js"></script>
  <script>
    // Check login
    if (localStorage.getItem('portfolio_logged_in') !== 'true') {
      window.location.href = 'login.html';
    }

    // Render qualifications with edit/delete buttons
    renderQualifications('dashboard-quals-container', true);

    // Form submit handler
    document.getElementById('qual-form').addEventListener('submit', handleQualificationSubmit);

    // Logout
    document.getElementById('logout-btn').addEventListener('click', function() {
      localStorage.removeItem('portfolio_logged_in');
      window.location.href = 'index.html';
    });

    // Initialize progress type toggle
    toggleProgressFields();
	
	
	  // Render gallery images
  renderDashboardGallery('dashboard-gallery-container');

  // Gallery form submit
  document.getElementById('gallery-form').addEventListener('submit', handleGallerySubmit);
  </script>
  
  <script src="gallery.js"></script>
</body>
</html>
