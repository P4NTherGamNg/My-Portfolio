<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Dumindu Dulanjana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* login specific styles */
    .login-section {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
    }
    .login-card {
      background: var(--bg-secondary);
      padding: 48px 40px;
      border-radius: 40px;
      box-shadow: var(--shadow-card);
      max-width: 420px;
      width: 100%;
      border: 1px solid var(--card-border);
    }
    .login-card h2 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-primary);
    }
    .login-card p {
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid var(--card-border);
      border-radius: 30px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--btn-primary);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      border-radius: 40px;
      background: var(--btn-primary);
      color: white;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .login-btn:hover {
      background: var(--btn-primary-hover);
    }
    .error-message {
      color: #dc2626;
      font-size: 0.9rem;
      margin-top: 16px;
      text-align: center;
    }
    .back-link {
      text-align: center;
      margin-top: 24px;
    }
    .back-link a {
      color: var(--text-muted);
      text-decoration: none;
    }
    .back-link a:hover {
      color: var(--btn-primary);
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <div class="logo">Dumindu D.</div>
      <div class="nav-links">
        <a href="index.html#home">Home</a>
        <a href="index.html#about">About</a>
        <a href="index.html#qualifications">Qualifications</a>
        <a href="index.html#contact">Contact</a>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </nav>
  </div>

  <section class="login-section">
    <div class="login-card">
      <h2>Welcome back</h2>
      <p>Login to access your dashboard</p>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="admin" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Password" required>
        </div>
        <button type="submit" class="login-btn">Sign in</button>
        <div id="login-error" class="error-message"></div>
      </form>
      <div class="back-link">
        <a href="index.html">← Back to portfolio</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>© 2026 Dumindu Dulanjana — ICT portfolio</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script src="messages.js"></script>
  <script>
    // Login handling
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorDiv = document.getElementById('login-error');

      // Hardcoded credentials (for demo only) – change these!
      if (username === 'adminDula' && password === 'admin0227') {
        // Set logged in flag
        localStorage.setItem('portfolio_logged_in', 'true');
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      } else {
        errorDiv.textContent = 'Invalid username or password.';
      }
    });
  </script>
</body>
</html>
